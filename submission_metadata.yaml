compute:
  platform: "Local CPU machine"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.11"
  os: "Windows 11"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_time_minutes: 10

ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini (Antigravity IDE) for code review, architecture discussion, and development assistance.
  No candidate data was fed to any external LLM API during the ranking step.
  All ranking logic runs locally on CPU with no network calls.

methodology_summary: |
  Hybrid rule-based + semantic ranker. Six heuristic components (skills keyword matching,
  career quality, experience band, location fit, education tier, behavioral modifier)
  combined with MiniLM-L6-v2 cosine similarity via pre-computed embeddings.
  Honeypot detection via career timeline math, skill duration anomalies, and platform
  signal inconsistencies. Final score = 55% heuristic + 45% semantic, scaled by
  behavioral modifier (notice period, recency, recruiter response rate).
  Runtime: <5 minutes on CPU. Zero external API calls during ranking.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
